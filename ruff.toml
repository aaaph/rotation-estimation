# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "src/my_custom_package",
    "venv",
]

# Include Jupyter notebooks
extend-include = ["*.ipynb"]

# Same as Black.
line-length = 115
indent-width = 4

# Assume Python 3.9
target-version = "py312"

[lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`) codes by default.
select = ["ALL"]
ignore = [
    "D100",   # Missing docstring in public module
    "D104",   # Missing docstring in public package
    "EM101",  # Exception must not use a string literal, assign to variable first
    "TRY003", # Avoid specifying long messages outside the exception class
    "D211",   # Fix warning incompatibility: no-blank-line-before-class
    "D212",   # Fix warning incompatibility: multi-line-summary-first-line
    "COM812", # Removed by warning in format API
    "D203",   # Removed by warning in format API
    "G004",   # Checks for uses of f-strings to format logging messages.
    "ERA001", # Error code should be a constant

]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = [
    "D", # Dont fix docstyle from others
]

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"


[lint.per-file-ignores]
# ignore unused imports in __init__.py files
"__init__.py" = ["F401"]
"test_*.py" = [
    "ANN",     # Ignore Annotation rules in tests
    "S101",    # asserts allowed in tests...
    "ARG",     # Unused function args -> fixtures nevertheless are functionally relevant...
    "FBT",     # Don't care about booleans as positional arguments in tests, e.g. via @pytest.mark.parametrize()
    "PLR2004", # Magic value used in comparison, ...
    "S311",    # Standard pseudo-random generators are not suitable for cryptographic purposes
    "D103",    # Missing docstring in public function
]

[lint.isort]
known-third-party = ["pydbow3"]
