[workspace]
authors = ["Ivan Aphanasyev <nekaktotak2@gmail.com>"]
channels = ["conda-forge", "robostack-kilted"]
name = "rotation_estimation"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
version = "0.1.0"

[tasks]
"ide:mac" = { cmd = "./scripts/activate-ide-profile.sh mac", default-environment = "dev-runtime" }
"ide:pi5" = { cmd = "./scripts/activate-ide-profile.sh pi5", default-environment = "edge-runtime" }
zenohd = "./scripts/run-zenohd.sh"
heartbeat_listener = "ros2 topic echo /m1_heartbeat"
heartbeat_publisher = "ros2 topic pub /m1_heartbeat std_msgs/msg/Int32 '{data: 1}' --rate 1"
new-cpp-node = { args = ["package", "node"], cmd = "python scripts/create_cpp_node.py {{ package }} {{ node }}" }
format = { depends-on = ["format-py", "format-cpp"] }
format-cpp = "python scripts/format_cpp.py"
format-py = "ruff format . && ruff check --fix ."
lint = { depends-on = ["lint-py", "lint-cpp"] }
lint-cpp = { cmd = "colcon test --event-handlers console_direct+ --ctest-args -L linter", depends-on = ["build"] }
lint-py = "ruff check . && ty check --exclude 'src/my_custom_package/**'"
test = { depends-on = ["test-py", "test-cpp"] }
test-cpp = { cmd = "colcon test --event-handlers console_direct+ --ctest-args -LE linter", depends-on = ["build"] }
test-py = "PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest --verbose --color=yes --log-cli-level=WARNING src"
check = "pixi run lint && pixi run test"
build = "colcon build --symlink-install --cmake-args -DCMAKE_EXPORT_COMPILE_COMMANDS=ON"

[tasks.sense_hat_imu_mock]
args = [{ arg = "mode", default = "stationary" }]
cmd = "bash -lc 'source install/setup.bash && ros2 run sense_hat_bridge sense_hat_node --ros-args -p mock:=true -p mock_mode:={{ mode }}'"
depends-on = ["build"]

[activation.env]
RMW_IMPLEMENTATION = "rmw_zenoh_cpp"

[activation]
scripts = ["scripts/activate-ros-env.sh"]

[dependencies]
colcon-common-extensions = ">=0.3.0,<0.4"
numpy = ">=2.5.1,<3"
pytest = ">=9.1.1,<10"
ros-kilted-rclpy = ">=9.1.5,<10"
ros-kilted-rmw-zenoh-cpp = "*"
ros-kilted-ros-core = "*"
ros-kilted-sensor-msgs = "*"
ruff = ">=0.15.20,<0.16"
ty = ">=0.0.56,<0.0.57"
ros-kilted-ament-cmake-auto = ">=2.7.5,<3"
compilers = ">=1.11.0,<2"
pkg-config = ">=0.29.2,<0.30"
ninja = ">=1.13.2,<2"
cmake = "<4"
clang-format = ">=19.1.7,<23"
clang-tools = ">=19.1.7,<23"
ros-kilted-ament-cmake-clang-format = ">=0.19.2,<0.20"
ros-kilted-ament-cmake-clang-tidy = ">=0.19.2,<0.20"

[feature.dev-runtime]
platforms = ["osx-arm64", "linux-64"]
channels = ["robostack-kilted", "conda-forge"]

[feature.edge-runtime]
platforms = ["linux-aarch64"]
channels = ["robostack-kilted", "conda-forge"]

[feature.dev-runtime.tasks]
rviz = "rviz2"
rerun = "rerun"


[feature.edge-runtime.tasks]
sense_hat_udp_reader = "env -u PYTHONPATH -u PYTHONHOME /usr/bin/python3 src/sense_hat/sense_hat_udp_publisher.py"
sense_hat_imu = { cmd = "bash -lc 'source install/setup.bash && ros2 run sense_hat_bridge sense_hat_node'", depends-on = ["build"] }

[feature.dev-runtime.dependencies]
ros-kilted-rviz2 = "*"
rerun-sdk = "*"

[environments]
dev-runtime = { features = ["dev-runtime"] }
edge-runtime = { features = ["edge-runtime"] }
