name: Test

on:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.0
          cache: true
          cache-write: ${{ github.ref_name == 'master' }}

      - name: Run Full Check
        run: pixi run check
